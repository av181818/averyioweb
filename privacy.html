<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy — AveryIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #e01c2e;
      --red-dim:    rgba(224,28,46,0.15);
      --red-border: rgba(224,28,46,0.4);
      --bg:         #09000b;
      --surface:    rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.08);
      --text:       #ffffff;
      --muted:      rgba(255,255,255,0.45);
      --subtle:     rgba(255,255,255,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(224,28,46,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(224,28,46,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 0 clamp(20px, 5%, 60px);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 4px;
    }
    nav a:hover { color: var(--text); }

    .nav-logo {
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .nav-logo span { color: var(--red); }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: clamp(48px, 10vw, 96px) clamp(20px, 5%, 60px) clamp(48px, 8vw, 80px);
      max-width: 680px;
      width: 100%;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--red);
      margin-bottom: 1.4rem;
    }
    .page-eyebrow::before {
      content: '';
      display: block;
      width: 20px;
      height: 1.5px;
      background: var(--red);
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 2.5rem;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 440px;
    }

    .app-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.4rem;
      min-height: 56px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      -webkit-tap-highlight-color: transparent;
    }
    .app-link:hover {
      background: var(--red-dim);
      border-color: var(--red-border);
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(224,28,46,0.12);
    }

    .app-link .arrow {
      color: var(--muted);
      font-size: 1rem;
      transition: transform 0.2s, color 0.2s;
    }
    .app-link:hover .arrow { transform: translateX(3px); color: var(--red); }

    footer {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding: 1.6rem clamp(20px, 5%, 60px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0 2px;
    }
    footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      footer { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">averyio<span>.net</span></a>
  </nav>

  <main>
    <span class="page-eyebrow">Legal</span>
    <h1>App Privacy Policies</h1>
    <div class="app-list">
      <a href="privacy-surge.html" class="app-link">
        <span>Surge</span>
        <span class="arrow">&#8594;</span>
      </a>
      <a href="privacy-investfast.html" class="app-link">
        <span>InvestFast</span>
        <span class="arrow">&#8594;</span>
      </a>
    </div>
  </main>

  <footer>
    <span>&copy; 2026 AveryIO</span>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </footer>

</body>
</html>
