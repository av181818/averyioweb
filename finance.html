  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #C4152B;
      --red-border: rgba(196,21,43,0.22);
      --ink:        #0E0E10;
      --bg:         #F6F5F2;
      --surface:    #FFFFFF;
      --border:     #E6E4DF;
      --text:       #111113;
      --muted:      #6B6B70;
      --faint:      #9A9A9E;
      --mono:       ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 48% at 78% -6%, rgba(196,21,43,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 12% 4%, rgba(196,21,43,0.035) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(0,0,0,0.045) 1px, transparent 1px);
      background-size: 26px 26px;
      -webkit-mask-image: radial-gradient(ellipse 100% 80% at 50% 0%, #000 30%, transparent 80%);
              mask-image: radial-gradient(ellipse 100% 80% at 50% 0%, #000 30%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { width: 100%; max-width: 1120px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 56px); }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: rgba(246,245,242,0.78);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner { height: 64px; display: flex; align-items: center; justify-content: space-between; }

    .nav-logo { font-size: 0.98rem; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.04em; }
    .nav-logo span { color: var(--red); }

    .nav-links { display: flex; gap: 0.15rem; align-items: center; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 13px;
      border-radius: 9px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-links a:hover { color: var(--text); background: rgba(0,0,0,0.045); }
    .nav-links a.active { color: var(--text); }
    .nav-links a.nav-cta { color: #fff; background: var(--ink); margin-left: 0.35rem; }
    .nav-links a.nav-cta:hover { background: #2a2a2e; }

    /* ── Hero: a single link to X ── */
    main { position: relative; z-index: 1; }
    .hero { width: 100%; padding-top: clamp(80px, 14vw, 150px); padding-bottom: clamp(18px, 4vw, 36px); }
    .hero h1 {
      font-size: clamp(3rem, 11vw, 6.4rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.92;
      color: var(--ink);
    }
    .hero h1 .accent { color: var(--red); }

    .x-cta {
      margin-top: 2.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.95rem 1.6rem;
      border-radius: 13px;
      background: var(--ink);
      color: #fff;
      text-decoration: none;
      font-size: 0.98rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18), 0 10px 24px rgba(0,0,0,0.14);
      transition: transform 0.18s ease, box-shadow 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .x-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.16), 0 18px 38px rgba(0,0,0,0.16); }
    .x-cta svg { width: 19px; height: 19px; fill: currentColor; }
    .x-cta .a { transition: transform 0.18s; }
    .x-cta:hover .a { transform: translateX(3px); }

    .disclaimer {
      margin-top: 1.6rem;
      font-size: 0.78rem;
      color: var(--faint);
      max-width: 420px;
      line-height: 1.55;
    }

    /* ── Footer ── */
    footer { position: relative; z-index: 1; margin-top: auto; border-top: 1px solid var(--border); }
    .footer-inner {
      padding: 1.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
      padding: 4px 8px;
      border-radius: 6px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
    }
    footer a:hover { color: var(--text); }
    .footer-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .nav-inner { padding-left: 16px; padding-right: 16px; }
      .nav-links { gap: 0.05rem; }
      .nav-links a { padding: 7px 7px; font-size: 0.8rem; }
      .nav-links a.nav-cta { margin-left: 0.2rem; padding: 7px 10px; }
      .nav-logo { font-size: 0.9rem; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
    @media (max-width: 345px) {
      .nav-links { gap: 0; }
      .nav-links a { padding: 7px 4px; font-size: 0.75rem; }
      .nav-links a.nav-cta { padding: 7px 7px; }
      .nav-logo { font-size: 0.82rem; }
    }
  </style>
</head>
