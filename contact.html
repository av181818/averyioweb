<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — AveryIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #e01c2e;
      --red-dim:    rgba(224,28,46,0.15);
      --red-border: rgba(224,28,46,0.4);
      --bg:         #09000b;
      --surface:    rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.08);
      --text:       #ffffff;
      --muted:      rgba(255,255,255,0.45);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(224,28,46,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(224,28,46,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 0 clamp(20px, 5%, 60px);
      height: 60px;
      display: flex;
      align-items: center;
    }

    .nav-logo {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--red); }

    .page-header {
      position: relative;
      z-index: 1;
      padding: clamp(48px, 10vw, 96px) clamp(20px, 5%, 60px) clamp(32px, 6vw, 48px);
      max-width: 760px;
    }

    .page-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--red);
      margin-bottom: 1.4rem;
    }
    .page-eyebrow::before {
      content: '';
      display: block;
      width: 20px;
      height: 1.5px;
      background: var(--red);
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      margin-bottom: 0.8rem;
    }

    .page-sub {
      font-size: clamp(0.9rem, 2vw, 1rem);
      color: var(--muted);
      font-weight: 300;
      line-height: 1.6;
    }

    .x-wrapper {
      position: relative;
      z-index: 1;
      padding: 0 clamp(20px, 5%, 60px) clamp(48px, 8vw, 80px);
    }

    .x-card {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      padding: 1.2rem 1.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.25s, border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      -webkit-tap-highlight-color: transparent;
    }
    .x-card:hover {
      background: var(--red-dim);
      border-color: var(--red-border);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(224,28,46,0.12);
    }

    .x-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      fill: var(--text);
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding: 1.6rem clamp(20px, 5%, 60px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 0 2px;
    }
    footer a:hover { color: var(--text); }

    @media (max-width: 480px) {
      footer { flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">averyio<span>.net</span></a>
  </nav>

  <div class="page-header">
    <span class="page-eyebrow">Get in touch</span>
    <h1>Contact Us</h1>
    <p class="page-sub">Have a question or want to work together? Message me via X direct message.</p>
  </div>

  <div class="x-wrapper">
    <a href="https://x.com/averyio18" target="_blank" rel="noopener" class="x-card">
      <svg class="x-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      @averyio18
    </a>
  </div>

  <footer>
    <span>&copy; 2026 AveryIO</span>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </footer>

</body>
</html>
