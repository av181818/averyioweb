<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — averyio</title>
  <meta name="description" content="Get in touch with averyio." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23C4152B'/%3E%3Ctext x='16' y='23' font-family='Arial,sans-serif' font-size='21' font-weight='700' text-anchor='middle' fill='white'%3Ea%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #C4152B;
      --red-border: rgba(196,21,43,0.22);
      --ink:        #0E0E10;
      --bg:         #F6F5F2;
      --surface:    #FFFFFF;
      --border:     #E6E4DF;
      --text:       #111113;
      --muted:      #6B6B70;
      --faint:      #9A9A9E;
      --mono:       ui-monospace, 'SF Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 48% at 78% -6%, rgba(196,21,43,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 12% 4%, rgba(196,21,43,0.035) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(0,0,0,0.045) 1px, transparent 1px);
      background-size: 26px 26px;
      -webkit-mask-image: radial-gradient(ellipse 100% 80% at 50% 0%, #000 30%, transparent 80%);
              mask-image: radial-gradient(ellipse 100% 80% at 50% 0%, #000 30%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap { width: 100%; max-width: 1120px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 56px); }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      background: rgba(246,245,242,0.78);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner { height: 64px; display: flex; align-items: center; justify-content: space-between; }

    .nav-logo { font-size: 0.98rem; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.04em; }
    .nav-logo span { color: var(--red); }

    .nav-links { display: flex; gap: 0.15rem; align-items: center; }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 13px;
      border-radius: 9px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-links a:hover { color: var(--text); background: rgba(0,0,0,0.045); }
    .nav-links a.active { color: var(--text); }
    .nav-links a.nav-cta { color: #fff; background: var(--ink); margin-left: 0.35rem; }
    .nav-links a.nav-cta:hover { background: #2a2a2e; }

    /* ── Page header ── */
    .page-header {
      position: relative;
      z-index: 1;
      padding: clamp(80px, 14vw, 150px) 0 clamp(36px, 6vw, 56px);
      max-width: 640px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--red);
      margin-bottom: 1.5rem;
    }
    .eyebrow::before { content: ''; width: 22px; height: 1.5px; background: var(--red); flex-shrink: 0; }

    h1 {
      font-size: clamp(3rem, 11vw, 6.4rem);
      font-weight: 900;
      letter-spacing: -0.05em;
      color: var(--ink);
      margin-bottom: 1.3rem;
      line-height: 0.92;
    }
    h1 .accent { color: var(--red); }

    .page-sub { font-size: clamp(0.98rem, 2.2vw, 1.1rem); color: var(--muted); font-weight: 400; line-height: 1.6; max-width: 440px; }

    /* ── Contact card ── */
    .contact-wrapper {
      position: relative;
      z-index: 1;
      padding-bottom: clamp(64px, 12vw, 112px);
    }

    .x-card {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      padding: 1.1rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 0.95rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 6px 18px rgba(0,0,0,0.035);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .x-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(0,0,0,0.08), 0 22px 44px rgba(196,21,43,0.09);
      border-color: var(--red-border);
    }
    .x-icon { width: 20px; height: 20px; flex-shrink: 0; fill: var(--text); }

    /* ── Footer ── */
    footer { position: relative; z-index: 1; margin-top: auto; border-top: 1px solid var(--border); }
    .footer-inner {
      padding: 1.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
      padding: 4px 8px;
      border-radius: 6px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
    }
    footer a:hover { color: var(--text); }
    .footer-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
    }
    @media (max-width: 480px) {
      .nav-inner { padding-left: 16px; padding-right: 16px; }
      .nav-links { gap: 0.05rem; }
      .nav-links a { padding: 7px 7px; font-size: 0.8rem; }
      .nav-links a.nav-cta { margin-left: 0.2rem; padding: 7px 10px; }
      .nav-logo { font-size: 0.9rem; }
      .footer-inner { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    }
    @media (max-width: 345px) {
      .nav-links { gap: 0; }
      .nav-links a { padding: 7px 4px; font-size: 0.75rem; }
      .nav-links a.nav-cta { padding: 7px 7px; }
      .nav-logo { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="wrap nav-inner">
      <a class="nav-logo" href="index.html">averyio<span>.net</span></a>
      <div class="nav-links">
        <a href="privacy.html">Privacy</a>
        <a class="nav-cta" href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <div class="page-header">
      <h1>Let's talk<span class="accent">.</span></h1>
      <p class="page-sub">Have a question, an idea, or just want to say hello? The fastest way to reach us is on X.</p>
    </div>

    <div class="contact-wrapper">
      <a href="https://x.com/averyio18" target="_blank" rel="noopener" class="x-card">
        <svg class="x-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        @averyio18
      </a>
    </div>
  </div>

  <footer>
    <div class="wrap footer-inner">
      <span>&copy; 2026 averyio</span>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="apps.html">Apps</a>
        <a href="finance.html">Buy the dip</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
      </div>
    </div>
  </footer>

</body>
</html>
